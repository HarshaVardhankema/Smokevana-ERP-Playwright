<svg width="300" height="300" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughen" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2"/>
    </filter>

    <path id="topText" d="M 200,200 m -155,0 a 155,155 0 0,1 310,0" />
    <path id="bottomText" d="M 200,200 m 155,0 a 155,155 0 0,1 -310,0" />
    <path id="leftText" d="M 200,200 m 0,-155 a 155,155 0 0,1 0,310" />
    <path id="rightText" d="M 200,200 m 0,155 a 155,155 0 0,1 0,-310" />
  </defs>

  <g transform="rotate(-15 200 200)" filter="url(#roughen)">
    <circle cx="200" cy="200" r="180" fill="none" stroke="#04bff5" stroke-width="8"/>
    <circle cx="200" cy="200" r="130" fill="none" stroke="#04bff5" stroke-width="8"/>
    <text x="200" y="200" font-size="55" text-anchor="middle" fill="#04bff5" font-weight="bold" font-family="Arial, sans-serif" dominant-baseline="middle">
      Ordered
    </text>
    <text font-size="18" fill="#04bff5" font-family="Arial, sans-serif" font-weight="bold">
      <textPath href="#topText" startOffset="50%" text-anchor="middle">Smokevana</textPath>
    </text>
    <text font-size="18" fill="#04bff5" font-family="Arial, sans-serif" font-weight="bold">
      <textPath href="#bottomText" startOffset="50%" text-anchor="middle">Smokevana</textPath>
    </text>
    <text font-size="18" fill="#04bff5" font-family="Arial, sans-serif" font-weight="bold">
      <textPath href="#leftText" startOffset="50%" text-anchor="middle">Smokevana</textPath>
    </text>
    <text font-size="18" fill="#04bff5" font-family="Arial, sans-serif" font-weight="bold">
      <textPath href="#rightText" startOffset="50%" text-anchor="middle">Smokevana</textPath>
    </text>
  </g>
</svg>